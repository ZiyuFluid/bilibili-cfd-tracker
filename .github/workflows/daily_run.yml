name: Bilibili CFD Daily Push

on:
  schedule:
    # 修改为：每 5 天的北京时间早上 8:00 运行 (UTC时间 0:00)
    - cron: '0 0 */5 * *'
  workflow_dispatch: # 允许手动点击运行测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script
        env:
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }} # 新增：读取你的B站Cookie
        run: python bili_push.py
